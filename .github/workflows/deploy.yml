name: Roro
on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.44.4'

      - name: Build Web
        run: |
          flutter pub get
          flutter build web --release --base-href /

      - name: Deploy to Vercel
        run: |
          npm install -g vercel
          # 強制連結專案，確保 Vercel CLI 知道要部署到哪裡
          vercel link --yes --token ${{ secrets.VERCEL_TOKEN }} --project ${{ secrets.VERCEL_PROJECT_ID }} --scope ${{ secrets.VERCEL_ORG_ID }}
          # 直接發佈已經編譯好的檔案，強制不進行二次編譯
          vercel deploy --prebuilt --token ${{ secrets.VERCEL_TOKEN }} --prod
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}