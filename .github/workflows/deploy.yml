name: Roro
on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.44.4'

      - name: Build Web
        run: |
          flutter pub get
          flutter build web --release --base-href /

      - name: Deploy to Vercel
        run: |
          npm install -g vercel
          
          # 1. 依照 Vercel Build Output API 規格建立目錄
          mkdir -p .vercel/output/static
          
          # 2. 將 Flutter 編譯成品搬移至 Vercel 要求的靜態目錄
          cp -r build/web/* .vercel/output/static/
          
          # 3. 建立 Vercel 必須的設定檔 (處理路由轉發，避免 404)
          echo '{"version":3,"routes":[{"handle":"filesystem"},{"src":"/.*","dest":"/index.html"}]}' > .vercel/output/config.json
          
          # 4. 強制連結並部署
          vercel link --yes --token ${{ secrets.VERCEL_TOKEN }} --project ${{ secrets.VERCEL_PROJECT_ID }} --scope ${{ secrets.VERCEL_ORG_ID }}
          vercel deploy --prebuilt --token ${{ secrets.VERCEL_TOKEN }} --prod
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}